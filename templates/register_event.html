<!doctype html>
<html>
  <head>
    <title>Register for {{ event.name }}</title>
  </head>
  <body>
    <h2>Register for {{ event.name }}</h2>
    <form method="POST">
      {% csrf_token %}
      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
      /><br /><br />
      <input
        type="email"
        name="email"
        placeholder="Your Email"
        required
      /><br /><br />
      <button type="submit">Register</button>
    </form>
  </body>
</html>
